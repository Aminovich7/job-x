info:
  name: jobx
  description: >-
    Freelance Marketplace API — full flow test collection.

    Run requests in order: Register → Login → Create Project → Bid → Accept → Finish → Review.

    Requires a running server at http://127.0.0.1:8000.
  schema: https://schema.getpostman.com/json/collection/v2.1.0/collection.json
variable:
  - key: base_url
    value: http://127.0.0.1:8000
  - key: client_token
    value: ""
  - key: freelancer_token
    value: ""
  - key: project_id
    value: ""
  - key: bid_id
    value: ""
  - key: contract_id
    value: ""
item:
  - name: Auth
    item:
      - name: Register Client
        request:
          method: POST
          url:
            raw: "{{base_url}}/api/auth/register/"
            host:
              - "{{base_url}}"
            path:
              - api
              - auth
              - register
              - ""
          header:
            - key: Content-Type
              value: application/json
          body:
            mode: raw
            raw: |-
              {
                "username": "client1",
                "email": "client1@test.com",
                "password": "TestPass123!",
                "role": "client"
              }
        event:
          - listen: test
            script:
              exec:
                - "var res = pm.response.json();"
                - "if (res.id) { console.log('Client registered: ' + res.username); }"
      - name: Register Freelancer
        request:
          method: POST
          url:
            raw: "{{base_url}}/api/auth/register/"
            host:
              - "{{base_url}}"
            path:
              - api
              - auth
              - register
              - ""
          header:
            - key: Content-Type
              value: application/json
          body:
            mode: raw
            raw: |-
              {
                "username": "freelancer1",
                "email": "freelancer1@test.com",
                "password": "TestPass123!",
                "role": "freelancer"
              }
        event:
          - listen: test
            script:
              exec:
                - "var res = pm.response.json();"
                - "if (res.id) { console.log('Freelancer registered: ' + res.username); }"
      - name: Login Client
        request:
          method: POST
          url:
            raw: "{{base_url}}/api/auth/login/"
            host:
              - "{{base_url}}"
            path:
              - api
              - auth
              - login
              - ""
          header:
            - key: Content-Type
              value: application/json
          body:
            mode: raw
            raw: |-
              {
                "username": "client1",
                "password": "TestPass123!"
              }
        event:
          - listen: test
            script:
              exec:
                - "var res = pm.response.json();"
                - "if (res.access) {"
                - "    pm.collectionVariables.set('client_token', res.access);"
                - "    console.log('Client token saved');"
                - "}"
      - name: Login Freelancer
        request:
          method: POST
          url:
            raw: "{{base_url}}/api/auth/login/"
            host:
              - "{{base_url}}"
            path:
              - api
              - auth
              - login
              - ""
          header:
            - key: Content-Type
              value: application/json
          body:
            mode: raw
            raw: |-
              {
                "username": "freelancer1",
                "password": "TestPass123!"
              }
        event:
          - listen: test
            script:
              exec:
                - "var res = pm.response.json();"
                - "if (res.access) {"
                - "    pm.collectionVariables.set('freelancer_token', res.access);"
                - "    console.log('Freelancer token saved');"
                - "}"
  - name: Projects
    item:
      - name: Create Project (client)
        request:
          method: POST
          url:
            raw: "{{base_url}}/api/projects"
            host:
              - "{{base_url}}"
            path:
              - api
              - projects
          header:
            - key: Content-Type
              value: application/json
            - key: Authorization
              value: "Bearer {{client_token}}"
          body:
            mode: raw
            raw: |-
              {
                "title": "Build a landing page",
                "description": "Need a responsive landing page with hero section.",
                "budget": "500.00",
                "deadline": "2026-12-31"
              }
        event:
          - listen: test
            script:
              exec:
                - "var res = pm.response.json();"
                - "if (res.id) {"
                - "    pm.collectionVariables.set('project_id', res.id);"
                - "    console.log('Project created: ' + res.id);"
                - "}"
      - name: List Projects
        request:
          method: GET
          url:
            raw: "{{base_url}}/api/projects"
            host:
              - "{{base_url}}"
            path:
              - api
              - projects
          header:
            - key: Authorization
              value: "Bearer {{client_token}}"
      - name: List Projects with filters
        request:
          method: GET
          url:
            raw: "{{base_url}}/api/projects?search=landing&min_budget=100&max_budget=1000"
            host:
              - "{{base_url}}"
            path:
              - api
              - projects
            query:
              - key: search
                value: landing
              - key: min_budget
                value: "100"
              - key: max_budget
                value: "1000"
          header:
            - key: Authorization
              value: "Bearer {{client_token}}"
      - name: Get Project Detail
        request:
          method: GET
          url:
            raw: "{{base_url}}/api/projects/{{project_id}}/"
            host:
              - "{{base_url}}"
            path:
              - api
              - projects
              - "{{project_id}}"
              - ""
          header:
            - key: Authorization
              value: "Bearer {{client_token}}"
  - name: Bids
    item:
      - name: Place Bid (freelancer)
        request:
          method: POST
          url:
            raw: "{{base_url}}/api/projects/{{project_id}}/bids/"
            host:
              - "{{base_url}}"
            path:
              - api
              - projects
              - "{{project_id}}"
              - bids
              - ""
          header:
            - key: Content-Type
              value: application/json
            - key: Authorization
              value: "Bearer {{freelancer_token}}"
          body:
            mode: raw
            raw: |-
              {
                "price": "450.00",
                "message": "I can build this in 5 days with Tailwind CSS."
              }
        event:
          - listen: test
            script:
              exec:
                - "var res = pm.response.json();"
                - "if (res.id) {"
                - "    pm.collectionVariables.set('bid_id', res.id);"
                - "    console.log('Bid placed: ' + res.id);"
                - "}"
      - name: List Bids (project owner)
        request:
          method: GET
          url:
            raw: "{{base_url}}/api/projects/{{project_id}}/bids/"
            host:
              - "{{base_url}}"
            path:
              - api
              - projects
              - "{{project_id}}"
              - bids
              - ""
          header:
            - key: Authorization
              value: "Bearer {{client_token}}"
      - name: Accept Bid (client)
        request:
          method: POST
          url:
            raw: "{{base_url}}/api/projects/{{project_id}}/bids/{{bid_id}}/accept/"
            host:
              - "{{base_url}}"
            path:
              - api
              - projects
              - "{{project_id}}"
              - bids
              - "{{bid_id}}"
              - accept
              - ""
          header:
            - key: Authorization
              value: "Bearer {{client_token}}"
        event:
          - listen: test
            script:
              exec:
                - "var res = pm.response.json();"
                - "if (res.contract_id) {"
                - "    pm.collectionVariables.set('contract_id', res.contract_id);"
                - "    console.log('Bid accepted. Contract: ' + res.contract_id);"
                - "}"
  - name: Contracts
    item:
      - name: List Contracts
        request:
          method: GET
          url:
            raw: "{{base_url}}/api/contracts"
            host:
              - "{{base_url}}"
            path:
              - api
              - contracts
          header:
            - key: Authorization
              value: "Bearer {{client_token}}"
      - name: Get Contract Detail
        request:
          method: GET
          url:
            raw: "{{base_url}}/api/contracts/{{contract_id}}/"
            host:
              - "{{base_url}}"
            path:
              - api
              - contracts
              - "{{contract_id}}"
              - ""
          header:
            - key: Authorization
              value: "Bearer {{client_token}}"
      - name: Finish Contract (client)
        request:
          method: POST
          url:
            raw: "{{base_url}}/api/contracts/{{contract_id}}/finish/"
            host:
              - "{{base_url}}"
            path:
              - api
              - contracts
              - "{{contract_id}}"
              - finish
              - ""
          header:
            - key: Authorization
              value: "Bearer {{client_token}}"
      - name: Review Contract (client)
        request:
          method: POST
          url:
            raw: "{{base_url}}/api/contracts/{{contract_id}}/review/"
            host:
              - "{{base_url}}"
            path:
              - api
              - contracts
              - "{{contract_id}}"
              - review
              - ""
          header:
            - key: Content-Type
              value: application/json
            - key: Authorization
              value: "Bearer {{client_token}}"
          body:
            mode: raw
            raw: |-
              {
                "rating": 5,
                "comment": "Excellent work, delivered on time."
              }
  - name: Schema & Docs
    item:
      - name: OpenAPI Schema (YAML)
        request:
          method: GET
          url:
            raw: "{{base_url}}/api/schema/?format=yaml"
            host:
              - "{{base_url}}"
            path:
              - api
              - schema
              - ""
            query:
              - key: format
                value: yaml
      - name: Swagger UI
        request:
          method: GET
          url:
            raw: "{{base_url}}/api/docs/"
            host:
              - "{{base_url}}"
            path:
              - api
              - docs
              - ""
