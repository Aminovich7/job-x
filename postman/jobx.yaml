openapi: 3.0.3
info:
  title: Freelance Marketplace API
  version: "1.0.0"
  description: Mini Upwork backend API.
servers:
  - url: http://127.0.0.1:8000
paths:
  /api/auth/register/:
    post:
      summary: Register user
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
  /api/auth/login/:
    post:
      summary: Login user
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenPair"
  /api/projects/:
    get:
      summary: List open projects
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: search
          schema:
            type: string
        - in: query
          name: min_budget
          schema:
            type: string
        - in: query
          name: max_budget
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedProjectList"
    post:
      summary: Create project
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
  /api/projects/{project_id}/:
    get:
      summary: Project detail
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: project_id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
  /api/projects/{project_id}/bids/:
    get:
      summary: List project bids
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: project_id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Bid"
    post:
      summary: Create bid
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: project_id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BidRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Bid"
  /api/projects/{project_id}/bids/{bid_id}/accept/:
    post:
      summary: Accept bid
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: project_id
          required: true
          schema:
            type: integer
        - in: path
          name: bid_id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcceptBid"
  /api/contracts/:
    get:
      summary: List my contracts
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Contract"
  /api/contracts/{contract_id}/:
    get:
      summary: Contract detail
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: contract_id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contract"
  /api/contracts/{contract_id}/finish/:
    post:
      summary: Finish contract
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: contract_id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contract"
  /api/contracts/{contract_id}/review/:
    post:
      summary: Review contract
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: contract_id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Review"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    RegisterRequest:
      type: object
      required: [username, email, password, role]
      properties:
        username:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
        role:
          type: string
          enum: [client, freelancer]
    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string
    TokenPair:
      type: object
      properties:
        refresh:
          type: string
        access:
          type: string
    User:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        email:
          type: string
        role:
          type: string
        bio:
          type: string
        created_at:
          type: string
          format: date-time
    ProjectRequest:
      type: object
      required: [title, description, budget, deadline]
      properties:
        title:
          type: string
        description:
          type: string
        budget:
          type: string
        deadline:
          type: string
          format: date
    Project:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        budget:
          type: string
        deadline:
          type: string
          format: date
        status:
          type: string
        client:
          type: integer
        created_at:
          type: string
          format: date-time
    PaginatedProjectList:
      type: object
      properties:
        count:
          type: integer
        next:
          type: string
          nullable: true
        previous:
          type: string
          nullable: true
        results:
          type: array
          items:
            $ref: "#/components/schemas/Project"
    BidRequest:
      type: object
      required: [price, message]
      properties:
        price:
          type: string
        message:
          type: string
    Bid:
      type: object
      properties:
        id:
          type: integer
        project:
          type: integer
        freelancer:
          type: integer
        price:
          type: string
        message:
          type: string
        status:
          type: string
        created_at:
          type: string
          format: date-time
    AcceptBid:
      type: object
      properties:
        bid_id:
          type: integer
        status:
          type: string
        project_status:
          type: string
        contract_id:
          type: integer
    Contract:
      type: object
      properties:
        id:
          type: integer
        project:
          type: integer
        client:
          type: integer
        freelancer:
          type: integer
        agreed_price:
          type: string
        status:
          type: string
        created_at:
          type: string
          format: date-time
        finished_at:
          type: string
          format: date-time
          nullable: true
    ReviewRequest:
      type: object
      required: [rating, comment]
      properties:
        rating:
          type: integer
          minimum: 1
          maximum: 5
        comment:
          type: string
    Review:
      type: object
      properties:
        id:
          type: integer
        contract:
          type: integer
        rating:
          type: integer
        comment:
          type: string
        created_at:
          type: string
          format: date-time
